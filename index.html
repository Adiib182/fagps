<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Sistem FAT GPS</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f7f6; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            text-align: center; 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            width: 100%;
            max-width: 400px; /* Membatasi lebar agar tidak terlalu melar di layar lebar */
        }
        h1 { color: #333; margin-bottom: 30px; }
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        
        /* Gaya Dasar Tombol */
        .btn { 
            display: block; 
            padding: 15px 30px; 
            color: white; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: bold; 
            transition: 0.3s; 
            text-align: center;
        }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }

        /* Warna spesifik tiap menu */
        .btn-acc { background-color: #0070f3; } /* Biru */
        .btn-inv { background-color: #10b981; } /* Hijau */
        .btn-trc { background-color: #f59e0b; } /* Oranye/Kuning */
    </style>
</head>
<body>
    <div class="container">
        <h1>Pilih Sistem</h1>
        <div class="menu-grid">
            <a href="acc.html" class="btn btn-acc">💰 Gamezone ACC</a>
            <a href="inv.html" class="btn btn-inv">📦 Inventory FNB</a>
            <a href="trc.html" class="btn btn-trc">💻 Tracking Job</a>
        </div>
    </div>
</body>
</html>
